# tmux-agent-sidebar plugin
# Source this file from tmux.conf:
#   source-file ~/.config/tmux-agent-sidebar/agent-sidebar.conf
#
# Customizable options (set BEFORE source-file to override):
#   @agent_sidebar_dir    - utils directory (default: ~/.config/tmux-agent-sidebar/utils)
#   @sidebar_width        - sidebar width in columns, or percentage of window width (default: 15%)
#   @sidebar_key          - keybinding to toggle sidebar (default: e)
#   @sidebar_color_*      - 256-color codes for sidebar elements

# --- Script location ---
if -F '#{==:#{@agent_sidebar_dir},}' 'set -g @agent_sidebar_dir ~/.config/tmux-agent-sidebar/utils'

# --- Sidebar options ---
if -F '#{==:#{@sidebar_width},}' 'set -g @sidebar_width 15%'
if -F '#{==:#{@sidebar_prompt_lines},}' 'set -g @sidebar_prompt_lines 3'
if -F '#{==:#{@sidebar_activity_lines},}' 'set -g @sidebar_activity_lines 8'
if -F '#{==:#{@sidebar_key},}' 'set -g @sidebar_key e'

# --- Colors (256-color codes) ---
if -F '#{==:#{@sidebar_color_session},}' 'set -g @sidebar_color_session 39'
if -F '#{==:#{@sidebar_color_running},}' 'set -g @sidebar_color_running 82'
if -F '#{==:#{@sidebar_color_waiting},}' 'set -g @sidebar_color_waiting 221'
if -F '#{==:#{@sidebar_color_idle},}' 'set -g @sidebar_color_idle 250'
if -F '#{==:#{@sidebar_color_error},}' 'set -g @sidebar_color_error 203'
if -F '#{==:#{@sidebar_color_path},}' 'set -g @sidebar_color_path 255'
if -F '#{==:#{@sidebar_color_agent_claude},}' 'set -g @sidebar_color_agent_claude 174'
if -F '#{==:#{@sidebar_color_agent_codex},}' 'set -g @sidebar_color_agent_codex 141'
if -F '#{==:#{@sidebar_color_border},}' 'set -g @sidebar_color_border 240'
if -F '#{==:#{@sidebar_color_border_active},}' 'set -g @sidebar_color_border_active 117'
if -F '#{==:#{@sidebar_color_text_active},}' 'set -g @sidebar_color_text_active 255'
if -F '#{==:#{@sidebar_color_text_muted},}' 'set -g @sidebar_color_text_muted 250'
if -F '#{==:#{@sidebar_color_wait_reason},}' 'set -g @sidebar_color_wait_reason 221'

# --- Keybinding ---
run-shell 'key="$(tmux display-message -p "#{@sidebar_key}")"; dir="$(tmux display-message -p "#{@agent_sidebar_dir}")"; tmux bind "$key" run-shell "bash \"$dir/sidebar-toggle.sh\" \"##{window_id}\" \"##{pane_current_path}\""'

# --- Hooks (remove first to prevent duplicates on config reload) ---
set-hook -gu after-new-window
set-hook -gu after-select-pane
set-hook -gu pane-exited

# --- Auto sidebar on new window (create-only, no toggle) ---
set-hook -ga after-new-window 'run-shell "bash \"#{@agent_sidebar_dir}/sidebar-toggle.sh\" --create-only \"#{window_id}\" \"#{pane_current_path}\""'

# --- Notify sidebar on pane focus change (SIGUSR1 → instant refresh) ---
set-hook -ga after-select-pane "run-shell -b 'tmux list-panes -t \"#{window_id}\" -F \"#{@sidebar_pid}\" 2>/dev/null | while read pid; do [ -n \"\$pid\" ] && kill -USR1 \"\$pid\" 2>/dev/null; done; true'"

# --- Auto close window when only sidebar remains ---
set-hook -ga pane-exited 'run-shell "bash \"#{@agent_sidebar_dir}/auto-close.sh\" \"#{window_id}\""'
