# ==============================================================================
# General
# ==============================================================================
set -g mouse on
set-option -g set-titles on
set-option -g set-titles-string '#{?SSH_CONNECTION,⚡,}#{session_name}:#{b:pane_current_path}'
set -s set-clipboard on
set -g allow-passthrough on
set-window-option -g mode-keys vi
set -g history-limit 50000
set -g base-index 1
set -g renumber-windows on
set -g status-interval 10
set -g default-shell /opt/homebrew/bin/fish

# ==============================================================================
# Terminal
# ==============================================================================
set-option -g default-terminal "tmux-256color"
set -s extended-keys on
set -as terminal-features ',*:RGB'
set -as terminal-features 'tmux-256color:extkeys'
bind-key -n S-Enter send-keys Escape "\[13;2u"

# ==============================================================================
# Appearance
# ==============================================================================
set-option -g pane-border-style fg="#555555"
set-option -g pane-active-border-style fg="#7cd2f7"
set-option -g window-style 'bg=#2a2a2a,fg=#888888'
set-option -g window-active-style 'bg=terminal,fg=terminal'
set-option -g status-position bottom
set-option -g status-justify "absolute-centre"
set-option -g status-style "bg=#333333,fg=#7cd2f7"

# ==============================================================================
# Status Left
# ==============================================================================
set-option -g status-left-length 100
set-option -g status-left '\
#[norange]#[fg=#ffffff,bg=#3a7ca5] #S \
#{?client_prefix,#[fg=colour67]#[bg=colour65],#[fg=colour67]#[bg=colour239]}\
#[fg=colour252] #{s|#{HOME}|~|:pane_current_path}\
#{?#(~/.config/tmux/git-branch.sh #{pane_current_path}), (#(~/.config/tmux/git-branch.sh #{pane_current_path})),} \
#{?client_prefix,#[fg=colour65]#[bg=colour236],#[fg=colour239]#[bg=colour236]}\
#[default]'
set-option -g status-right-length 120
set -g status-right '\
#(~/.config/tmux/popup-icon.sh #{pane_current_path})\
#{cpu_bg_color} CPU #[fg=#333333,bg=#4a4a4a]#[fg=#cccccc,bg=#4a4a4a] #{cpu_percentage} #[fg=#4a4a4a,bg=#333333]#[default] \
#{ram_bg_color} RAM #[fg=#333333,bg=#4a4a4a]#[fg=#cccccc,bg=#4a4a4a] #{ram_percentage} #[fg=#4a4a4a,bg=#333333]#[default] \
#[fg=#cccccc,bg=#4a4a4a] %m/%d/%y %H:%M #[fg=#4a4a4a,bg=#333333]#[default]'

# tmux-cpu thresholds (low=green, medium=yellow, high=red)
set -g @cpu_low_bg_color "#[fg=#ffffff,bg=#4a9e78]"
set -g @cpu_medium_bg_color "#[fg=#ffffff,bg=#b89840]"
set -g @cpu_high_bg_color "#[fg=#ffffff,bg=#b8524a]"
set -g @ram_low_bg_color "#[fg=#ffffff,bg=#4a9e78]"
set -g @ram_medium_bg_color "#[fg=#ffffff,bg=#b89840]"
set -g @ram_high_bg_color "#[fg=#ffffff,bg=#b8524a]"

# ==============================================================================
# Window Status (tabs)
# ==============================================================================
set -g @window_status_current_left '#[fg=#3a7ca5]#[bg=#333333]#[fg=#ffffff]#[bg=#3a7ca5] '
set -g @window_status_left '#[fg=#4a4a4a]#[bg=#333333]#[fg=#888888]#[bg=#4a4a4a] '
set -g @window_status_right '#[fg=#3a7ca5]#[bg=#333333]'
set -g @window_status_right_inactive '#[fg=#4a4a4a]#[bg=#333333]'
set-window-option -g window-status-current-style "default"
set-window-option -g window-status-current-format '\
#{?#{e|>:#{session_windows},1},#{E:@window_status_current_left}#(~/.config/tmux/pane-icon.sh #{pane_id})#[fg=#ffffff]#{b:pane_current_path} #{E:@window_status_right},}'
set-window-option -g window-status-style "default"
set-window-option -g window-status-format '\
#{?#{e|>:#{session_windows},1},#{E:@window_status_left}#(~/.config/tmux/pane-icon.sh #{pane_id})#[fg=#888888]#{b:pane_current_path} #{E:@window_status_right_inactive},}'

# ==============================================================================
# Keybindings
# ==============================================================================

# prefix: Ctrl+q
set -g prefix C-q
unbind C-b
bind C-q send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Ctrl+\ vertical, Ctrl+- horizontal
bind -n C-\\ split-window -h -c "#{pane_current_path}"
bind -n C-- split-window -v -c "#{pane_current_path}"

# Ctrl+h: cycle windows (create if only one)
bind -n C-h if-shell "[ #{session_windows} -le 1 ]" "new-window -a" "next-window"
# Ctrl+g: toggle persistent popup
bind -n C-g run-shell 'bash ~/.config/tmux/popup.sh "#{pane_current_path}" "#{session_name}"'

# Agent sidebar plugin
set -g @plugin 'hiroppy/tmux-agent-sidebar'
set -g @sidebar_mascot on
bind -n C-j run-shell 'bash ~/.config/tmux/select-next-pane.sh'
bind -n C-p run-shell 'bash ~/.config/tmux/toggle-sidebar.sh'

# copy-mode-vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "~/.config/tmux/copy-to-clipboard.sh"
bind-key -T copy-mode-vi a send-keys -X start-of-line
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/.config/tmux/copy-to-clipboard.sh"

# ==============================================================================
# Plugins (TPM must be initialized at the end)
# ==============================================================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
run '~/.tmux/plugins/tpm/tpm'
