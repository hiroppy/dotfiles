# set-option -g status-utf8 on
set -g mouse on
set-option -g set-titles on
set-option -g set-titles-string '#{?SSH_CONNECTION,⚡,}#{session_name}:#{b:pane_current_path}'
set -s set-clipboard on
set -g allow-passthrough on
set-window-option -g mode-keys vi
set -g history-limit 50000

# set-option -g default-command "[ -z \"\${ORIG_PWD_FOR_TMUX+set}\" ] || { cd \"\${ORIG_PWD_FOR_TMUX}\"; unset ORIG_PWD_FOR_TMUX; }; exec ${SHELL}"
# set-option -g -a update-environment " ORIG_PWD_FOR_TMUX"

# 256 color
set-option -g default-terminal "tmux-256color"
set -s extended-keys on
set -as terminal-features ',*:RGB'
set -as terminal-features 'tmux-256color:extkeys'
bind-key -n S-Enter send-keys Escape "\[13;2u"
set-option -g status-position bottom;

#### COLOUR (Solarized dark)
#### cf: https://github.com/altercation/solarized/blob/master/tmux/tmuxcolors-dark.conf

# default statusbar colors
# set-option -g status-bg black #base02
# set-option -g status-fg "#7cd2f7"
# set-option -g status-attr default
# default window title colors
# set-window-option -g window-status-fg brightblue #base0
# set-window-option -g window-status-bg default
#set-window-option -g window-status-attr dim
# active window title colors
# set-window-option -g window-status-current-fg brightred #orange
# set-window-option -g window-status-current-bg default
#set-window-option -g window-status-current-attr bright
# pane border
set-option -g pane-border-style fg="#555555"
set-option -g pane-active-border-style fg="#7cd2f7"
# 非アクティブペインを薄く表示
set-option -g window-style 'bg=#2a2a2a,fg=#888888'
set-option -g window-active-style 'bg=terminal,fg=terminal'
# message text
# set-option -g message-bg black #base02
# set-option -g message-fg brightred #orange
# pane number display
# set-option -g display-panes-active-colour blue #blue
# set-option -g display-panes-colour brightred #orange
# clock
# set-window-option -g clock-mode-colour green #green

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
set-option -g status-justify "absolute-centre"
set-option -g status-left-length 100
# prefix時: colour65(緑) / 通常時: colour239(グレー)
# colour67≈#3a7ca5, colour252≈#cccccc, colour236≈#333333
set-option -g status-left '\
#[fg=#ffffff,bg=#3a7ca5] #S \
#{?client_prefix,#[fg=colour67]#[bg=colour65],#[fg=colour67]#[bg=colour239]}\
#[fg=colour252] #{s|#{HOME}|~|:pane_current_path}\
#{?#(~/.config/tmux/git-branch.sh #{pane_current_path}), (#(~/.config/tmux/git-branch.sh #{pane_current_path})),} \
#{?client_prefix,#[fg=colour65]#[bg=colour236],#[fg=colour239]#[bg=colour236]}\
#[default]'
set-option -g status-right-length 120
set-option -g status-right '#{?#(~/.config/tmux/popup-status.sh #{pane_current_path}),#[fg=#ffffff]#[bg=#da7756] Popup #[fg=#da7756]#[bg=#333333]#[default] ,}#{cpu_bg_color} CPU #[fg=#333333,bg=#4a4a4a]#[fg=#cccccc,bg=#4a4a4a] #{cpu_percentage} #[fg=#4a4a4a,bg=#333333]#[default] #{ram_bg_color} RAM #[fg=#333333,bg=#4a4a4a]#[fg=#cccccc,bg=#4a4a4a] #{ram_percentage} #[fg=#4a4a4a,bg=#333333]#[default] #[fg=#cccccc,bg=#4a4a4a] %m/%d/%y %H:%M #[fg=#4a4a4a,bg=#333333]#[default]'

# tmux-cpu の色設定（低:緑 中:黄 高:赤）
set -g @cpu_low_bg_color "#[fg=#ffffff,bg=#4a9e78]"
set -g @cpu_medium_bg_color "#[fg=#ffffff,bg=#b89840]"
set -g @cpu_high_bg_color "#[fg=#ffffff,bg=#b8524a]"
set -g @ram_low_bg_color "#[fg=#ffffff,bg=#4a9e78]"
set -g @ram_medium_bg_color "#[fg=#ffffff,bg=#b89840]"
set -g @ram_high_bg_color "#[fg=#ffffff,bg=#b8524a]"
set-option -g status-style "bg=#333333,fg=#7cd2f7"

set-window-option -g window-status-current-style "default"
set-window-option -g window-status-current-format "#{?#{e|>:#{session_windows},1},#[fg=#3a7ca5]#[bg=#333333]#[fg=#ffffff]#[bg=#3a7ca5] #{b:pane_current_path} #[fg=#3a7ca5]#[bg=#333333],}"
set-window-option -g window-status-style "default"
set-window-option -g window-status-format "#{?#{e|>:#{session_windows},1},#[fg=#4a4a4a]#[bg=#333333]#[fg=#888888]#[bg=#4a4a4a] #{b:pane_current_path} #[fg=#4a4a4a]#[bg=#333333],}"

# https://github.com/tmux/tmux/issues/543
set -g default-shell /opt/homebrew/bin/fish

# prefixをCtrl+qに変更
set -g prefix C-q
unbind C-b
bind C-q send-prefix

# Ctrl+\ で縦分割、Ctrl+- で横分割
bind -n C-\\ split-window -h -c "#{pane_current_path}"
bind -n C-- split-window -v -c "#{pane_current_path}"

# Ctrl+jでペイン巡回、端なら隣のウィンドウへ
bind -n C-j run-shell 'cur="#{pane_id}"; tmux select-pane -t :.+; [ "$cur" = "$(tmux display -p "#{pane_id}")" ] && tmux select-window -t :+; true'
# Ctrl+hでウィンドウ巡回（1つなら新規作成）
bind -n C-h if-shell "[ #{session_windows} -le 1 ]" "new-window" "next-window"
# Ctrl+gで永続popup切り替え
bind -n C-g run-shell 'bash ~/.config/tmux/popup.sh "#{pane_current_path}" "#{session_name}"'

# copy-mode-vi キーバインド
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "~/.config/tmux/copy-to-clipboard.sh"
bind-key -T copy-mode-vi a send-keys -X start-of-line

# マウスドラッグでもコピー
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/.config/tmux/copy-to-clipboard.sh"

# Plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Initialize TPM (この行は末尾に置く)
run '~/.tmux/plugins/tpm/tpm'
